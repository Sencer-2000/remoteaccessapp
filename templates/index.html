<!DOCTYPE html>
<html>
<head>
    <title>Remote Control Panel</title>
    <style>
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: Arial;
            padding: 20px;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .danger {
            background: red;
            color: white;
        }

        .card {
            background: #1c1c1c;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kill {
            background: crimson;
            border: none;
            color: white;
            padding: 5px 10px;
        }
    </style>
</head>

<body>

<h1>🖥 Remote Control Panel</h1>

<!-- ⛔ PC KAPAT -->
<button class="danger" onclick="shutdownPC()">⛔ PC Kapat</button>

<hr>

<!-- 🔗 LINK -->
<div class="row">
    <input id="link" placeholder="https://example.com">
    <button onclick="openLink()">🔗 Aç</button>
</div>

<hr>

<!-- 🧠 APPS -->
<h3>📱 Açık Uygulamalar</h3>
<div id="apps"></div>

<script>
async function loadApps() {
    let res = await fetch("/apps");
    let data = await res.json();

    let container = document.getElementById("apps");
    container.innerHTML = "";

    data.forEach(app => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <span>${app.name} (PID: ${app.pid})</span>
            <button class="kill" onclick="killApp('${app.pid}')">❌</button>
        `;

        container.appendChild(div);
    });
}


// 🔥 app kapat
function killApp(pid) {
    fetch("/set_command", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: "kill:" + pid
        })
    });
}

// ⛔ PC kapat
function shutdownPC() {
    fetch("/set_command", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: "pc-kapat"
        })
    });
}

// 🔗 link aç
function openLink() {
    let link = document.getElementById("link").value;

    fetch("/set_command", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: "link:" + link
        })
    });
}

// auto refresh
setInterval(loadApps, 2000);
loadApps();
</script>

</body>
</html>
